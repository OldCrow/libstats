<svg viewBox="0 0 860 600" xmlns="http://www.w3.org/2000/svg" style="font-family:system-ui,sans-serif;background:#fff">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#8a8a9a"/></marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#4aaa60"/></marker>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#cc5555"/></marker>
  </defs>

  <text x="430" y="20" text-anchor="middle" font-size="15" font-weight="500" fill="#222">Result&lt;T&gt; error handling &amp; distribution factory flows</text>

  <!-- Result<T> struct -->
  <rect x="560" y="36" width="284" height="130" rx="4" fill="#F8F8FC" stroke="#aaa" stroke-width="0.5"/>
  <text x="702" y="55" text-anchor="middle" font-size="13" font-weight="500" fill="#333">Result&lt;T&gt; template</text>
  <line x1="568" y1="62" x2="836" y2="62" stroke="#ddd" stroke-width="0.5"/>
  <text x="574" y="78" font-size="11" fill="#444">T              value</text>
  <text x="574" y="93" font-size="11" fill="#444">ValidationError   error_code</text>
  <text x="574" y="108" font-size="11" fill="#444">std::string    message</text>
  <line x1="568" y1="115" x2="836" y2="115" stroke="#ddd" stroke-width="0.5"/>
  <text x="574" y="130" font-size="11" fill="#666">bool isOk() / isError()</text>
  <text x="574" y="145" font-size="11" fill="#666">static Result ok(T val)</text>
  <text x="574" y="160" font-size="11" fill="#666">static Result makeError(code, msg)</text>

  <!-- ValidationError enum -->
  <rect x="560" y="180" width="284" height="96" rx="4" fill="#F8F8FC" stroke="#aaa" stroke-width="0.5"/>
  <text x="702" y="198" text-anchor="middle" font-size="13" font-weight="500" fill="#333">ValidationError enum</text>
  <line x1="568" y1="205" x2="836" y2="205" stroke="#ddd" stroke-width="0.5"/>
  <text x="574" y="221" font-size="11" fill="#444">None · InvalidMean · InvalidStdDev</text>
  <text x="574" y="236" font-size="11" fill="#444">InvalidRange · InvalidParameter</text>
  <text x="574" y="251" font-size="11" fill="#444">UnknownError</text>
  <text x="574" y="268" font-size="10" fill="#888">VoidResult = Result&lt;std::monostate&gt;</text>

  <!-- Four creation patterns -->
  <text x="20" y="50" font-size="13" font-weight="500" fill="#444">Four creation patterns</text>

  <!-- Pattern 1 -->
  <rect x="20" y="60" width="224" height="68" rx="4" fill="#F5F0FB" stroke="#7c6ab8" stroke-width="0.5"/>
  <text x="132" y="78" text-anchor="middle" font-size="12" font-weight="500" fill="#3d1a8a">① Exception constructor</text>
  <text x="28" y="95" font-size="10" fill="#6040b0">GaussianDistribution d(0.0, 1.0);</text>
  <text x="28" y="110" font-size="10" fill="#888">throws std::invalid_argument</text>
  <text x="28" y="122" font-size="10" fill="#888">if params are invalid</text>

  <!-- Pattern 2 -->
  <rect x="20" y="140" width="224" height="84" rx="4" fill="#EDF3FB" stroke="#4A90C4" stroke-width="1.5"/>
  <text x="132" y="158" text-anchor="middle" font-size="12" font-weight="500" fill="#1a3a6b">② Result-based factory  ★ preferred</text>
  <text x="28" y="175" font-size="10" fill="#3357a0">auto r = Gaussian::create(0.0, 1.0);</text>
  <text x="28" y="189" font-size="10" fill="#3357a0">if (r.isOk()) use(r.value);</text>
  <text x="28" y="203" font-size="10" fill="#3357a0">else log(r.message);</text>
  <text x="28" y="217" font-size="10" fill="#888">no-throw; preferred for library APIs</text>

  <!-- Pattern 3 -->
  <rect x="20" y="236" width="224" height="68" rx="4" fill="#FFF3E6" stroke="#c87820" stroke-width="0.5"/>
  <text x="132" y="254" text-anchor="middle" font-size="12" font-weight="500" fill="#7a3800">③ Unchecked (private)</text>
  <text x="28" y="271" font-size="10" fill="#a05010">Gaussian::createUnchecked(m, s)</text>
  <text x="28" y="285" font-size="10" fill="#888">bypasses validation; only called</text>
  <text x="28" y="297" font-size="10" fill="#888">from create() after validation</text>

  <!-- Pattern 4 -->
  <rect x="20" y="316" width="224" height="88" rx="4" fill="#F0F9F0" stroke="#4aaa60" stroke-width="0.5"/>
  <text x="132" y="334" text-anchor="middle" font-size="12" font-weight="500" fill="#1a5c28">④ Specialized factories</text>
  <text x="28" y="351" font-size="10" fill="#2d7a3a">Gamma::createWithScale(α, scale)</text>
  <text x="28" y="365" font-size="10" fill="#2d7a3a">  converts scale → rate β = 1/scale</text>
  <text x="28" y="381" font-size="10" fill="#2d7a3a">Gamma::createFromMoments(μ, σ²)</text>
  <text x="28" y="395" font-size="10" fill="#2d7a3a">  MoM: α = μ²/σ²,  β = μ/σ²</text>

  <!-- create() call chain -->
  <text x="20" y="432" font-size="13" font-weight="500" fill="#444">create() call chain  (Pattern ②)</text>

  <rect x="20" y="444" width="140" height="36" rx="4" fill="#E6F1FB" stroke="#4A90C4" stroke-width="0.5"/>
  <text x="90" y="460" text-anchor="middle" font-size="12" font-weight="500" fill="#0C447C">caller</text>
  <text x="90" y="474" text-anchor="middle" font-size="10" fill="#2266A0">Gaussian::create(μ, σ)</text>

  <line x1="160" y1="462" x2="196" y2="462" stroke="#8a8a9a" stroke-width="0.5" marker-end="url(#a)"/>

  <rect x="196" y="444" width="190" height="36" rx="4" fill="#FFF3E6" stroke="#c87820" stroke-width="0.5"/>
  <text x="291" y="460" text-anchor="middle" font-size="11" font-weight="500" fill="#7a3800">validateGaussianParams(μ, σ)</text>
  <text x="291" y="474" text-anchor="middle" font-size="10" fill="#a05010">returns VoidResult</text>

  <!-- error branch down -->
  <line x1="291" y1="480" x2="291" y2="514" stroke="#cc5555" stroke-width="0.5"/>
  <text x="250" y="500" font-size="10" fill="#cc5555">error</text>
  <line x1="291" y1="514" x2="20" y2="514" stroke="#cc5555" stroke-width="0.5" marker-end="url(#ar)"/>
  <rect x="20" y="522" width="260" height="36" rx="4" fill="#FEF0F0" stroke="#cc5555" stroke-width="0.5"/>
  <text x="150" y="538" text-anchor="middle" font-size="11" font-weight="500" fill="#7a1a1a">Result::makeError(code, msg)</text>
  <text x="150" y="552" text-anchor="middle" font-size="10" fill="#a03030">isError()=true · value unset</text>

  <!-- ok branch right -->
  <line x1="386" y1="462" x2="422" y2="462" stroke="#4aaa60" stroke-width="0.5" marker-end="url(#ag)"/>
  <text x="402" y="456" font-size="10" fill="#4aaa60">ok</text>

  <rect x="422" y="444" width="196" height="36" rx="4" fill="#F0F9F0" stroke="#4aaa60" stroke-width="0.5"/>
  <text x="520" y="460" text-anchor="middle" font-size="11" font-weight="500" fill="#1a5c28">createUnchecked(μ, σ)</text>
  <text x="520" y="474" text-anchor="middle" font-size="10" fill="#2d7a3a">private ctor, bypass-validation tag</text>

  <line x1="618" y1="462" x2="654" y2="462" stroke="#4aaa60" stroke-width="0.5" marker-end="url(#ag)"/>

  <rect x="654" y="444" width="190" height="36" rx="4" fill="#F0F9F0" stroke="#4aaa60" stroke-width="0.5"/>
  <text x="749" y="460" text-anchor="middle" font-size="11" font-weight="500" fill="#1a5c28">Result::ok(std::move(dist))</text>
  <text x="749" y="474" text-anchor="middle" font-size="10" fill="#2d7a3a">isOk()=true · value ready</text>

  <!-- trySet family -->
  <rect x="20" y="574" width="820" height="18" rx="4" fill="#F8F8FC" stroke="#ddd" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="430" y="587" text-anchor="middle" font-size="10" fill="#666">Post-construction mutation: trySetMean(v) / trySetStdDev(v) / trySetParameters(μ,σ)  →  VoidResult  (no-throw).  Throwing setMean(v) / setStdDev(v) also available.</text>

  <text x="430" y="598" text-anchor="middle" font-size="10" fill="#bbb">libstats v2.0.0  ·  docs/UML/result-factory-flow.svg</text>
</svg>
