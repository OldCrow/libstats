name: CI

on:
  push:
    branches: [ main, develop, 'release/*', 'v*' ]
    paths-ignore: ['**.md', 'docs/**', 'LICENSE']
  pull_request:
    branches: [ main ]
    paths-ignore: ['**.md', 'docs/**', 'LICENSE']
  # Monthly canary: catches drift with no code change to trigger it (runner
  # image rolls, toolchain updates) instead of discovering breakage at the
  # next real push.
  schedule:
    - cron: '30 3 1 * *'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # One Release build per platform/compiler. Debug legs were dropped (they
  # duplicated Release coverage without gating on warnings); the
  # strict-warnings job below uses the existing Strict build type (-Werror)
  # to catch what Debug builds never actually enforced.
  build:
    name: Build ${{ matrix.os }} ${{ matrix.compiler.name }} ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, compiler: { name: gcc-14,  cc: gcc-14,  cxx: g++-14  }, build_type: Release }
          - { os: ubuntu-latest, compiler: { name: clang-17, cc: clang-17, cxx: clang++-17 }, build_type: Release }
          - { os: macos-15,      compiler: { name: AppleClang, cc: clang, cxx: clang++ }, build_type: Release }
          - { os: windows-latest, compiler: { name: msvc, cc: cl, cxx: cl }, build_type: Release }

    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        persist-credentials: false
    - name: Setup MSVC (Windows)
      if: runner.os == 'Windows' && matrix.compiler.name == 'msvc'
      uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0
      with:
        arch: x64

    - name: Install compiler (Ubuntu)
      if: runner.os == 'Linux'
      env:
        CC_PKG: ${{ matrix.compiler.cc }}
        CXX_PKG: ${{ matrix.compiler.cxx }}
      run: |
        sudo apt-get update
        if [[ "$CC_PKG" == gcc* ]]; then
          sudo apt-get install -y "$CC_PKG" "$CXX_PKG"
        elif [[ "$CC_PKG" == clang* ]]; then
          sudo apt-get install -y "$CC_PKG"
        fi

    - name: Setup compiler environment
      if: runner.os != 'Windows' || matrix.compiler.name != 'msvc'
      env:
        CC_VAL: ${{ matrix.compiler.cc }}
        CXX_VAL: ${{ matrix.compiler.cxx }}
      run: |
        echo "CC=$CC_VAL" >> "$GITHUB_ENV"
        echo "CXX=$CXX_VAL" >> "$GITHUB_ENV"

    - name: Configure CMake (Windows MSVC)
      if: runner.os == 'Windows' && matrix.compiler.name == 'msvc'
      run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DCMAKE_CXX_STANDARD=20 -A x64

    - name: Configure CMake (Non-Windows or Non-MSVC)
      if: runner.os != 'Windows' || matrix.compiler.name != 'msvc'
      run: cmake -B build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} -DCMAKE_CXX_STANDARD=20

    - name: Build
      shell: bash
      run: |
        # Compute a memory-aware parallel job count.
        # Heavy C++ Release builds (lambdas, templates) can use 1.5–2 GB per
        # compiler process. GitHub-hosted ubuntu-latest has 7 GB total RAM
        # and 2 vCPUs; macOS has 14 GB and 3 vCPUs; Windows has 7 GB and 2 vCPUs.
        # We derive JOBS = min(cpu_count, floor(avail_mem_gb / 2)) so that memory
        # pressure never causes OOM, while still using the full CPU count when RAM
        # is healthy (the common case on macOS and Debug builds everywhere).
        if [ "${{ runner.os }}" == "Linux" ]; then
          MEM_GB=$(awk '/MemAvailable/{printf "%d", $2/1048576}' /proc/meminfo 2>/dev/null || echo 4)
          CPU=$(nproc 2>/dev/null || echo 2)
          MEM_JOBS=$(( MEM_GB / 2 ))
          JOBS=$(( MEM_JOBS < CPU ? MEM_JOBS : CPU ))
          JOBS=$(( JOBS < 1 ? 1 : JOBS ))
        elif [ "${{ runner.os }}" == "macOS" ]; then
          # macOS runners have 14 GB; use the full logical CPU count.
          JOBS=$(sysctl -n hw.logicalcpu 2>/dev/null || echo 3)
        else
          # Windows: NUMBER_OF_PROCESSORS is always set.
          JOBS="${NUMBER_OF_PROCESSORS:-2}"
        fi
        echo "Parallel build jobs: ${JOBS}"
        cmake --build build --config ${{ matrix.build_type }} --parallel "${JOBS}"

    - name: Setup Windows DLL paths
      if: runner.os == 'Windows'
      shell: bash
      run: |
        # Add DLL directories to PATH for Windows
        echo "Adding DLL directories to PATH..."

        # Convert to Windows paths and add to PATH
        if [ -d "build/${{ matrix.build_type }}" ]; then
          WIN_PATH=$(cygpath -w "${{ github.workspace }}/build/${{ matrix.build_type }}" 2>/dev/null || printf '%s' "${{ github.workspace }}\\build\\${{ matrix.build_type }}")
          echo "$WIN_PATH" >> "$GITHUB_PATH"
        fi

        if [ -d "build/tests/${{ matrix.build_type }}" ]; then
          WIN_PATH=$(cygpath -w "${{ github.workspace }}/build/tests/${{ matrix.build_type }}" 2>/dev/null || printf '%s' "${{ github.workspace }}\\build\\tests\\${{ matrix.build_type }}")
          echo "$WIN_PATH" >> "$GITHUB_PATH"
        fi

        # Also add the main build directory
        WIN_PATH=$(cygpath -w "${{ github.workspace }}/build" 2>/dev/null || printf '%s' "${{ github.workspace }}\\build")
        echo "$WIN_PATH" >> "$GITHUB_PATH"

        # Copy DLLs as a fallback
        if [ -f "build/${{ matrix.build_type }}/libstats.dll" ]; then
          cp "build/${{ matrix.build_type }}/libstats.dll" "build/tests/${{ matrix.build_type }}/" || true
          echo "Copied libstats.dll to build/tests/${{ matrix.build_type }}/"
        fi
        if [ -f "build/Release/libstats.dll" ]; then
          cp "build/Release/libstats.dll" "build/tests/Release/" || true
        fi
        if [ -f "build/Debug/libstats.dll" ]; then
          cp "build/Debug/libstats.dll" "build/tests/Debug/" || true
        fi

    - name: Test
      working-directory: build
      shell: bash
      run: |
        if [ "${{ runner.os }}" == "Windows" ]; then
          # On Windows, ensure PATH includes DLL directories
          export PATH="${{ github.workspace }}/build/${{ matrix.build_type }}:${{ github.workspace }}/build/tests/${{ matrix.build_type }}:${{ github.workspace }}/build:$PATH"
        fi
        # Exclude timing and benchmark tests: speedup assertions require a quiet
        # dedicated machine and serial execution. Run them locally with -j1 -L timing.
        ctest -C ${{ matrix.build_type }} --output-on-failure --parallel -LE "timing|benchmark"

    - name: Benchmark (Release only)
      if: matrix.build_type == 'Release'
      shell: bash
      run: |
        if [ -f "build/tools/system_inspector" ]; then
          ./build/tools/system_inspector --quick
        fi
        if [ -f "build/examples/gaussian_performance_benchmark" ]; then
          timeout 30 ./build/examples/gaussian_performance_benchmark || true
        fi

    # -------------------------------------------------------------------------
    # Install-contract smoke test — Linux/GCC/Release leg only (cheapest
    # runner; exercises the installed-package path via find_package + pkg-config).
    # -------------------------------------------------------------------------
    - name: Install to prefix
      if: runner.os == 'Linux' && matrix.compiler.name == 'gcc-14' && matrix.build_type == 'Release'
      run: cmake --install build --prefix "$GITHUB_WORKSPACE/_install"

    - name: Configure consumer_example against installed prefix
      if: runner.os == 'Linux' && matrix.compiler.name == 'gcc-14' && matrix.build_type == 'Release'
      run: |
        cmake -S consumer_example -B consumer_example/build \
          -DCMAKE_PREFIX_PATH="$GITHUB_WORKSPACE/_install"

    - name: Build and run consumer_example
      if: runner.os == 'Linux' && matrix.compiler.name == 'gcc-14' && matrix.build_type == 'Release'
      run: |
        cmake --build consumer_example/build
        ./consumer_example/build/consumer_demo

    - name: pkg-config smoke test
      if: runner.os == 'Linux' && matrix.compiler.name == 'gcc-14' && matrix.build_type == 'Release'
      run: |
        export PKG_CONFIG_PATH="$GITHUB_WORKSPACE/_install/lib/pkgconfig"
        pkg-config --exists --print-errors libstats
        pkg-config --cflags --libs libstats

  # ---------------------------------------------------------------------------
  # ASan+UBSan together in one Linux job (corvus/ewcalc pattern) rather than
  # separate runners per sanitizer.
  # ---------------------------------------------------------------------------
  sanitizers:
    name: Sanitizers (ASan/UBSan, Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        persist-credentials: false
    # Build only the library + test targets under instrumentation. The Test
    # step runs ctest, so examples/tools/benchmarks add heavy instrumented
    # compile time for no coverage gain — disabling them keeps this job inside
    # its timeout (the full instrumented build previously timed out at 20 min).
    - name: Configure (ASan + UBSan)
      run: |
        cmake -B build-san \
          -DCMAKE_BUILD_TYPE=Debug \
          -DLIBSTATS_BUILD_TOOLS=OFF \
          -DLIBSTATS_BUILD_EXAMPLES=OFF \
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -g -O1" \
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"

    # Bound parallelism to memory, not just CPU. Bare `--parallel` passes
    # `make -j` with no limit, spawning a compile per ready target; under
    # ASan+UBSan instrumentation (roughly 2x memory) that OOM-kills the 7 GB
    # runner (exit 143, "runner received a shutdown signal") within minutes.
    # Use mem/3 here (vs mem/2 for the uninstrumented matrix build) for the
    # instrumentation overhead.
    - name: Build
      shell: bash
      run: |
        MEM_GB=$(awk '/MemAvailable/{printf "%d", $2/1048576}' /proc/meminfo 2>/dev/null || echo 4)
        CPU=$(nproc 2>/dev/null || echo 2)
        MEM_JOBS=$(( MEM_GB / 3 ))
        JOBS=$(( MEM_JOBS < CPU ? MEM_JOBS : CPU ))
        JOBS=$(( JOBS < 1 ? 1 : JOBS ))
        echo "Parallel build jobs: ${JOBS}"
        cmake --build build-san --parallel "${JOBS}"

    - name: Test
      env:
        ASAN_OPTIONS: detect_leaks=1
        UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
      run: ctest --test-dir build-san --output-on-failure -LE "timing|benchmark"

  # ---------------------------------------------------------------------------
  # Strict warnings gate — replaces the old gcc-13/Windows Debug matrix legs.
  # Uses the Strict build type already defined in CMakeLists.txt (-Werror +
  # per-compiler strict warning sets); compile-only, no test run needed.
  # ---------------------------------------------------------------------------
  strict-warnings:
    name: Strict warnings (Linux, -Werror)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        persist-credentials: false
    - name: Configure (Strict)
      run: cmake -B build-strict -DCMAKE_BUILD_TYPE=Strict

    # Bound parallelism to memory (same reason as the Sanitizers/matrix jobs):
    # bare `--parallel` is an unlimited `make -j` that OOM-kills the 7 GB
    # runner (exit 143) mid-build. mem/2 matches the uninstrumented matrix.
    - name: Build
      shell: bash
      run: |
        MEM_GB=$(awk '/MemAvailable/{printf "%d", $2/1048576}' /proc/meminfo 2>/dev/null || echo 4)
        CPU=$(nproc 2>/dev/null || echo 2)
        MEM_JOBS=$(( MEM_GB / 2 ))
        JOBS=$(( MEM_JOBS < CPU ? MEM_JOBS : CPU ))
        JOBS=$(( JOBS < 1 ? 1 : JOBS ))
        echo "Parallel build jobs: ${JOBS}"
        cmake --build build-strict --parallel "${JOBS}"

  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        persist-credentials: false
    - name: Install tools
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-format-17 clang-tidy-17 cppcheck

    - name: Check formatting
      run: |
        # Report violations but do not fail: the codebase uses clang-format-18+
        # features; clang-format-17 (used here for compatibility checking) produces
        # minor differences that are version-specific, not style regressions.
        find include src tests \( -name '*.h' -o -name '*.cpp' \) -print0 | xargs -0 clang-format-17 --dry-run --Werror || true
        echo "Note: clang-format-17 check configured but not enforced (version mismatch with developer toolchain)"

    - name: Run clang-tidy
      run: |
        cmake -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
        # Only check our source files, exclude system headers
        find src -name '*.cpp' | head -5 | xargs clang-tidy-17 -p build \
          --header-filter='.*/(include|src)/.*\.h$' \
          --system-headers=false \
          --warnings-as-errors="" || true
        echo "Note: clang-tidy configured but not enforced yet"

    - name: Run cppcheck
      run: |
        cppcheck --enable=warning,style,performance,portability --error-exitcode=0 \
                 --suppress=missingIncludeSystem \
                 --inline-suppr \
                 -I include src 2>&1 | tee cppcheck.log
        echo "Note: cppcheck configured but not enforced yet"

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      with:
        persist-credentials: false
    - name: Clean build directory
      run: rm -rf build

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-13 g++-13 lcov
        gcc-13 --version
        g++-13 --version
        sudo update-alternatives --install /usr/bin/gcov gcov /usr/bin/gcov-13 100

    - name: Set compiler paths
      run: |
        {
          echo "CC=gcc-13"
          echo "CXX=g++-13"
          echo "GCOV=gcov-13"
        } >> "$GITHUB_ENV"

    - name: Configure with coverage
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_C_COMPILER=/usr/bin/gcc-13 \
          -DCMAKE_CXX_COMPILER=/usr/bin/g++-13 \
          -DCMAKE_CXX_FLAGS="--coverage -fprofile-arcs -ftest-coverage -fprofile-update=atomic" \
          -DCMAKE_C_FLAGS="--coverage -fprofile-arcs -ftest-coverage -fprofile-update=atomic"

    - name: Build
      shell: bash
      run: |
        # Same memory-aware logic as the main build job (see there for rationale).
        # Coverage builds compile with --coverage which adds instrumentation overhead;
        # keep the same job cap to avoid OOM on ubuntu-latest runners.
        MEM_GB=$(awk '/MemAvailable/{printf "%d", $2/1048576}' /proc/meminfo 2>/dev/null || echo 4)
        CPU=$(nproc 2>/dev/null || echo 2)
        MEM_JOBS=$(( MEM_GB / 2 ))
        JOBS=$(( MEM_JOBS < CPU ? MEM_JOBS : CPU ))
        JOBS=$(( JOBS < 1 ? 1 : JOBS ))
        echo "Parallel build jobs: ${JOBS}"
        cmake --build build --parallel "${JOBS}"

    - name: Run tests
      run: |
        cd build
        # Run tests sequentially for coverage to avoid profile data corruption
        # Exclude timing tests for the same reason as the main CI job.
        ctest --output-on-failure -LE "timing|benchmark"

    - name: Generate coverage report
      run: |
        # Explicitly use gcov-13 for coverage collection
        # --ignore-errors gcov suppresses missing .gcno errors for CMakeTmp probe
        # artifacts generated during configure-time SIMD detection; those files
        # have no corresponding .gcno because CMakeTmp is cleaned up after cmake.
        lcov --gcov-tool gcov-13 --directory build --capture --output-file coverage.info --ignore-errors gcov,mismatch
        lcov --remove coverage.info '/usr/*' '*/tests/*' '*/examples/*' --output-file coverage.info --ignore-errors unused
        lcov --list coverage.info

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@0fb7174895f61a3b6b78fc075e0cd60383518dac # v5.5.5
      with:
        files: ./coverage.info
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
